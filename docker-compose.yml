services:
  db:
    image: mysql:8.0
    container_name: dajeonghan-band-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dajeonghan_band
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db-queries.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
